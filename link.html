<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>料金・利用案内</title>

    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Zen Maru Gothic", sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(180deg, #EEF6FF, #F7F2FF);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding-top: 70px;
            color: #444;
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            width: 88%;
            max-width: 480px;
            padding: 48px 32px;
            border-radius: 34px 28px 36px 30px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.06);
            text-align: center;
        }

        h1 {
            font-size: 1.7rem;
            margin-bottom: 36px;
            color: #555;
        }

        .link-btn {
            display: block;
            background: #F8F7FF;
            padding: 18px 22px;
            margin-bottom: 22px;
            border-radius: 26px 22px 28px 24px;
            text-decoration: none;
            color: #4A6FA5;
            font-size: 1.15rem;
            box-shadow: 0 3px 8px rgba(0,0,0,0.05);
            transition: 0.25s;
            text-align: left;
        }

        .link-btn:hover {
            background: #EEF2FF;
            transform: translateY(-3px);
        }

        /* 「トップページに戻る」ボタン */
        .back-home {
            display: inline-block;
            margin-top: 25px;
            padding: 14px 35px;
            background-color: #FFFBEB; /* シャボン玉とお揃いのクリーム色 */
            color: #987666;           /* 輪郭とお揃いのココア色 */
            text-decoration: none;
            font-weight: bold;
            /* まるのおうち風のいびつな丸 */
            border-radius: 60% 40% 60% 40% / 45% 50% 50% 55%;
            border: 2.5px solid #987666;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .back-home:hover {
            background-color: #987666;
            color: #fff;
            transform: translateY(-2px) rotate(-1deg);
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>料金・利用案内</h1>

        <a href="https://drive.google.com/file/d/1vRiMo5x504joaX9PLrkFY-ZHVwqEl2VF/view?usp=sharing" class="link-btn" target="_blank">
            ▶ 料金について（PDF）
        </a>

        <a href="https://marunoouchir.wixsite.com/my-site" class="link-btn" target="_blank">
            ▶ 利用規約はこちら
        </a>

        <a href="index.html" class="back-home">
            トップページに戻る
        </a>
    </div>

</body>
</html>
