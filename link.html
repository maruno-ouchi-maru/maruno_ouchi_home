<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>料金・利用案内</title>

    <style>
        body {
            font-family: "Zen Maru Gothic", sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(180deg, #EEF6FF, #F7F2FF);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding-top: 70px;
            color: #444;
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            width: 88%;
            max-width: 480px;
            padding: 48px 32px;
            border-radius: 34px 28px 36px 30px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.06);
        }

        h1 {
            font-size: 1.7rem;
            margin-bottom: 36px;
            text-align: center;
            color: #555;
        }

        a {
            display: block;
            background: #F8F7FF;
            padding: 18px 22px;
            margin-bottom: 22px;
            border-radius: 26px 22px 28px 24px;
            text-decoration: none;
            color: #4A6FA5;
            font-size: 1.15rem;
            box-shadow: 0 3px 8px rgba(0,0,0,0.05);
            transition: 0.25s;
        }

        a:hover {
            background: #EEF2FF;
            transform: translateY(-3px);
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>料金・利用案内</h1>

        <!-- 料金PDF -->
        <a href="https://drive.google.com/file/d/1vRiMo5x504joaX9PLrkFY-ZHVwqEl2VF/view?usp=sharing" target="_blank">
            ▶ 料金について（PDF）
        </a>

        <!-- 利用規約（WIX） -->
        <a href="https://marunoouchir.wixsite.com/my-site" target="_blank">
            ▶ 利用規約はこちら
        </a>
    </div>

</body>
</html>
