<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ★SEO強化：タイトル -->
    <title>倉敷市の小学生向け学習塾｜まるのおうち</title>

    <!-- ★SEO強化：説明文 -->
    <meta name="description" content="倉敷市片島町の小学生向け学習塾『まるのおうち』。宿題が苦手な子、勉強に自信がない子が、自分のペースで学べる少人数の学び場です。">

    <link href="https://fonts.googleapis.com/css2?family=Yomogi&family=Zen+Maru+Gothic:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F7DDE8;
            font-family: 'Zen Maru Gothic', sans-serif;
            color: #444;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-container {
            display: flex;
            width: 100%;
            max-width: 1100px;
            padding: 40px;
            box-sizing: border-box;
            align-items: center;
            gap: 60px;
        }

        .left-column {
            flex: 1.2;
        }

        .right-column {
            flex: 0.8;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-placeholder img {
            width: 70px;
            height: auto;
            margin-bottom: 10px;
        }

        .title {
            font-family: 'Yomogi', cursive;
            font-size: 3.2rem;
            margin: 0 0 15px 0;
            color: #5a5a5a;
            font-weight: normal;
        }

        .location-text {
            font-size: 1.1rem;
            margin-bottom: 18px;
            color: #555;
        }

        .sub-message {
            font-family: 'Yomogi', cursive;
            font-size: 1.3rem;
            margin-bottom: 30px;
            color: #666;
        }

        .intro-text {
            line-height: 2;
            margin-bottom: 45px;
            font-size: 1.05rem;
            color: #555;
        }

        .button-group {
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 16px 28px;
            text-align: center;
            white-space: nowrap;
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 55% 45% 60% 40% / 45% 55% 40% 60%;
            border: 4.5px solid rgba(0,0,0,0.18);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-decoration: none;
            transition: 0.25s;
        }

        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        .btn-blue { background-color: #DDEEFF; color: #35527A; border-color: #A5C4F0; }
        .btn-pink { background-color: #FFC7D6; color: #7A354A; border-color: #E89AAF; }
        .btn-lavender { background-color: #EDE8FF; color: #4A3A7A; border-color: #C7BFF0; }
        .btn-mint { background-color: #E9FFF4; color: #2F6A55; border-color: #A8E8CC; }

        .gurimaru-wrapper {
            position: relative;
            width: 360px;
            height: 360px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 10px solid #987666;
            background:
                radial-gradient(circle at 70% 30%, rgba(255, 255, 255, 0) 60%, rgba(200, 255, 255, 0.25) 100%),
                radial-gradient(circle at 30% 70%, rgba(255, 255, 255, 0) 60%, rgba(255, 200, 255, 0.25) 100%),
                rgba(255, 252, 235, 0.3);
            box-shadow:
                inset 0 10px 30px rgba(255, 255, 255, 0.5),
                inset 0 -10px 30px rgba(0, 0, 0, 0.03),
                0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .gurimaru-wrapper::before {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.7);
            width: 70px;
            height: 35px;
            top: 40px;
            left: 55px;
            transform: rotate(-30deg);
            filter: blur(4px);
        }

        .gurimaru-img {
            width: 300px;
            height: 300px;
            object-fit: cover;
            border-radius: 50%;
            opacity: 0.95;
            position: relative;
            z-index: 1;
        }

        @media (max-width: 768px) {
            .main-container {
                flex-direction: column-reverse;
                text-align: center;
                padding: 20px;
            }
            .button-group { justify-content: center; flex-wrap: wrap; }
            .title { font-size: 2.6rem; }

            .gurimaru-wrapper {
                width: 300px;
                height: 300px;
            }
            .gurimaru-img {
                width: 250px;
                height: 250px;
            }
        }
    </style>
</head>

<body>
    <div class="main-container">
        <div class="left-column">
            <div class="logo-placeholder">
                <img src="logo.png" alt="倉敷市の小学生向け学習塾 まるのおうち ロゴ">
            </div>

            <h1 class="title">まるのおうち</h1>

            <p class="location-text">倉敷市片島町にある、小学生のための少人数制の学習塾です。</p>

            <p class="sub-message">子どもをまるごと受けとめ、自分にまるをあげられる場所</p>

            <div class="intro-text">
                まるのおうちは、子どもをまるごと受けとめる小さな居場所。<br>
                その子が感じた「できた」をたいせつにしています。<br>
                自分にまるをあげられる時間が流れています。
            </div>

            <div class="button-group">
                <a href="https://lin.ee/RL8yKoQ" class="btn btn-blue" target="_blank">ご予約（公式LINEへ）</a>
                <a href="about.html" class="btn btn-pink">まるのおうちとは</a>
                <a href="link.html" class="btn btn-lavender">料金・利用案内</a>
                <a href="access.html" class="btn btn-mint">アクセス</a>
            </div>
        </div>

        <div class="right-column">
            <div class="gurimaru-wrapper">
                <img src="gurimaru.png" alt="倉敷市の学習塾 まるのおうち マスコット ぐり丸" class="gurimaru-img">
            </div>
        </div>
    </div>
</body>
</html>
