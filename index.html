<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="jAdfyhqae6sPqOefW7jY0Ym1BHDnXhfJst-Ip8bQLxk" />
    
    <title>倉敷市の小学生向け学習塾｜まるのおうち</title>

    <meta name="description" content="倉敷市片島町の小学生向け学習塾『まるのおうち』。宿題が苦手な子、勉強に自信がない子が、自分のペースで学べる少人数の学び場です。">

    <link href="https://fonts.googleapis.com/css2?family=Yomogi&family=Zen+Maru+Gothic:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F7DDE8;
            font-family: 'Zen Maru Gothic', sans-serif;
            color: #444;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-container {
            display: flex;
            width: 100%;
            max-width: 1100px;
            padding: 40px;
            box-sizing: border-box;
            align-items: center;
            gap: 60px;
        }

        .left-column {
            flex: 1.2;
        }

        .right-column {
            flex: 0.8;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-placeholder img {
            width: 70px;
            height: auto;
            margin-bottom: 10px;
        }

        .title {
            font-family: 'Yomogi', cursive;
            font-size: 3.2rem;
            margin: 0 0 15px 0;
            color: #5a5a5a;
            font-weight: normal;
        }

        .location-text {
            font-size: 1.1rem;
            margin-bottom: 18px;
            color: #555;
        }

        .sub-message {
            font-family: 'Yomogi', cursive;
            font-size: 1.3rem;
            margin-bottom: 30px;
            color: #666;
        }

        .intro-text {
            line-height: 2;
            margin-bottom: 45px;
            font-size: 1.05rem;
            color: #555;
        }

        /* MENUボタン */
        .menu-btn {
            margin-top: 20px;
            padding: 22px 40px;
            background: #FFF7C8;
            color: #7A6A2F;
            border: 4px solid #F0E6A5;
            border-radius: 50%;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: 0.25s;
        }
        .menu-btn:hover {
            transform: translateY(-2px);
        }

        /* ポップアップ背景 */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.25);
            display: none;
            z-index: 90;
        }

        /* まんまるポップアップ */
        .popup-menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            width: 330px;
            height: 330px;
            background: #FFFFFFEE;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 20px;
            z-index: 100;
            transition: 0.25s ease;
        }

        .close-btn {
            position: absolute;
            top: 18px;
            right: 18px;
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            color: #666;
        }

        .popup-item {
            background: #F8F7FF;
            padding: 10px 18px;
            border-radius: 20px;
            text-decoration: none;
            color: #444;
            font-size: 0.95rem;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
            transition: 0.2s;
        }
        .popup-item:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .gurimaru-wrapper {
            position: relative;
            width: 360px;
            height: 360px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 10px solid #987666;
            background:
                radial-gradient(circle at 70% 30%, rgba(255, 255, 255, 0) 60%, rgba(200, 255, 255, 0.25) 100%),
                radial-gradient(circle at 30% 70%, rgba(255, 255, 255, 0) 60%, rgba(255, 200, 255, 0.25) 100%),
                rgba(255, 252, 235, 0.3);
            box-shadow:
                inset 0 10px 30px rgba(255, 255, 255, 0.5),
                inset 0 -10px 30px rgba(0, 0, 0, 0.03),
                0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .gurimaru-wrapper::before {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.7);
            width: 70px;
            height: 35px;
            top: 40px;
            left: 55px;
            transform: rotate(-30deg);
            filter: blur(4px);
        }

        .gurimaru-img {
            width: 300px;
            height: 300px;
            object-fit: cover;
            border-radius: 50%;
            opacity: 0.95;
            position: relative;
            z-index: 1;
        }

        @media (max-width: 768px) {
            .main-container {
                flex-direction: column-reverse;
                text-align: center;
                padding: 20px;
            }
            .title { font-size: 2.6rem; }

            .gurimaru-wrapper {
                width: 300px;
                height: 300px;
            }
            .gurimaru-img {
                width: 250px;
                height: 250px;
            }
        }
    </style>
</head>

<body>
    <div class="main-container">
        <div class="left-column">
            <div class="logo-placeholder">
                <img src="logo.png" alt="倉敷市の小学生向け学習塾 まるのおうち ロゴ">
            </div>

            <h1 class="title">まるのおうち</h1>

            <p class="location-text">
                倉敷市片島町にある、小学生のための少人数制の学習塾です。<br>
                宿題をその場で終わらせ、分からないところを丁寧に解き直して“できた”を増やします。
            </p>

            <p class="sub-message">子どもをまるごと受けとめ、自分にまるをあげられる場所</p>

            <div class="intro-text">
                まるのおうちは、子どもをまるごと受けとめる小さな居場所。<br>
                その子が感じた「できた」をたいせつにしています。<br>
                自分にまるをあげられる時間が流れています。
            </div>

            <!-- ▼ MENUボタンだけ残す -->
            <button class="menu-btn" onclick="openMenu()">MENU</button>
        </div>

        <div class="right-column">
            <div class="gurimaru-wrapper">
                <img src="gurimaru.png" alt="倉敷市の学習塾 まるのおうち マスコット ぐり丸" class="gurimaru-img">
            </div>
        </div>
    </div>

    <!-- ▼ ポップアップ -->
    <div id="popup-overlay" class="popup-overlay" onclick="closeMenu()"></div>

    <div id="popup-menu" class="popup-menu">
        <button class="close-btn" onclick="closeMenu()">×</button>

        <a href="https://lin.ee/RL8yKoQ" class="popup-item" target="_blank">ご予約（LINE）</a>
        <a href="about.html" class="popup-item">まるのおうちとは</a>
        <a href="link.html" class="popup-item">料金・利用案内</a>
        <a href="access.html" class="popup-item">アクセス</a>
        <a href="owner.html" class="popup-item">運営者紹介</a>
        <a href="faq.html" class="popup-item">よくある質問</a>
    </div>

    <script>
        function openMenu() {
            document.getElementById("popup-overlay").style.display = "block";
            const menu = document.getElementById("popup-menu");
            menu.style.display = "flex";
            setTimeout(() => {
                menu.style.transform = "translate(-50%, -50%) scale(1)";
            }, 10);
        }

        function closeMenu() {
            const menu = document.getElementById("popup-menu");
            menu.style.transform = "translate(-50%, -50%) scale(0.7)";
            setTimeout(() => {
                menu.style.display = "none";
                document.getElementById("popup-overlay").style.display = "none";
            }, 200);
        }
    </script>

</body>
</html>
