<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アクセス｜まるのおうち</title>

    <link href="https://fonts.googleapis.com/css2?family=Yomogi&family=Zen+Maru+Gothic:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F7DDE8;
            font-family: 'Zen Maru Gothic', sans-serif;
            color: #444;
            line-height: 1.9;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center; /* ボタンを中央に寄せるため追加 */
        }

        h1 {
            font-family: 'Yomogi', cursive;
            font-size: 2.6rem;
            color: #5a5a5a;
            margin-bottom: 25px;
            text-align: center;
        }

        .section {
            background: #ffffffaa;
            padding: 25px 30px;
            border-radius: 20px;
            margin-bottom: 35px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            text-align: left; /* 文章は左寄せを維持 */
        }

        .map-frame {
            width: 100%;
            height: 350px;
            border: none;
            border-radius: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        /* 「トップページに戻る」ボタン */
        .back-home {
            display: inline-block;
            margin-top: 10px;
            padding: 14px 35px;
            background-color: #FFFBEB; /* クリーム色 */
            color: #987666;           /* ココア色 */
            text-decoration: none;
            font-weight: bold;
            border-radius: 60% 40% 60% 40% / 45% 50% 50% 55%; /* いびつな丸 */
            border: 2.5px solid #987666;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .back-home:hover {
            background-color: #987666;
            color: #fff;
            transform: translateY(-2px) rotate(-1deg);
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            .map-frame { height: 260px; }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>アクセス</h1>

        <div class="section">
            <p><strong>まるのおうち</strong><br>
            倉敷市片島町842-3 にあります。<br>
            静かな住宅街の中にある、小さな学びの場所です。</p>
        </div>

        <div class="section">
            <h2 style="font-family:'Yomogi'; font-size:1.6rem; margin-bottom:15px;">地図</h2>
            <iframe 
                class="map-frame"
                src="https://www.google.com/maps?q=倉敷市片島町842-3&output=embed">
            </iframe>
        </div>

        <div class="section">
            <h2 style="font-family:'Yomogi'; font-size:1.6rem; margin-bottom:15px;">駐車場について</h2>
            <p>
                敷地内に <strong>2台分の駐車スペース</strong> があります。<br>
                送迎の一時停車も大丈夫です。<br><br>

                新築が完成したら、入口や駐車場の写真も追加していきます。<br>
                いまは準備中ですが、安心してお越しいただけるように整えていきます。
            </p>
        </div>

        <a href="index.html" class="back-home">
            トップページに戻る
        </a>

    </div>

</body>
</html>
