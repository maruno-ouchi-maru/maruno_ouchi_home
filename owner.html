
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>運営者紹介｜まるのおうち</title>

    <link href="https://fonts.googleapis.com/css2?family=Yomogi&family=Zen+Maru+Gothic:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #FFF7C8;
            font-family: 'Zen Maru Gothic', sans-serif;
            color: #444;
            line-height: 1.9;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px 80px;
        }

        h1 {
            font-family: 'Yomogi', cursive;
            font-size: 2.8rem;
            text-align: center;
            margin-bottom: 30px;
            color: #6A5A2F;
        }

        .profile-box {
            background: #ffffff;
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            border: 4px solid rgba(0,0,0,0.1);
        }

        /* ★画像が丸枠に完全に収まる設定 */
        .profile-img {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            object-fit: contain;      /* ← 切れずに全部入る */
            background-color: #ffffff; /* 余白が出ても自然 */
            padding: 12px;             /* 画像が端で切れない */
            display: block;
            margin: 0 auto 25px;
            border: 6px solid #F0E6A5;
        }

        p {
            font-size: 1.05rem;
            margin-bottom: 18px;
        }

        .back-btn {
            display: block;
            width: 200px;
            margin: 40px auto 0;
            padding: 14px 0;
            text-align: center;
            background-color: #FFEFA0;
            color: #6A5A2F;
            font-weight: 600;
            text-decoration: none;
            border-radius: 50px;
            border: 4px solid rgba(0,0,0,0.15);
            transition: 0.25s;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>運営者紹介</h1>

        <div class="profile-box">
            <img src="owner.png" alt="まるのおうち 運営者りょうことぐり丸のイラスト" class="profile-img">

            <p>まるのおうちをしている りょうこです。</p>

            <p>小学校教員として8年間、いろんな子どもたちと過ごす中で、宿題がしんどい子には、その子に合ったステップが必要だと感じてきました。</p>

            <p>「できた！」を積み重ねながら、自信を育てていける場所をつくりたい。その思いから、まるのおうちを始めました。</p>

            <p>これから、ぐり丸と暮らしながら、子どもたちの小さな成長をそっと見守っていきたいと思っています。</p>
        </div>

        <a href="index.html" class="back-btn">← トップへ戻る</a>
    </div>
</body>
</html>
